<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Auditoría Cris</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4f46e5">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  
  <style>
    /* Estilos base */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #f4f6f8; color: #1e293b; font-family: system-ui, -apple-system, sans-serif; padding: 12px; }
    .app { max-width: 500px; margin: 0 auto; display: none; }
    .app.active { display: block; }
    .login-screen { max-width: 400px; margin: 60px auto 0 auto; background: #fff; padding: 24px; border-radius: 16px; border: 1px solid #e2e8f0; text-align: center; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; width: 100%; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .section { display: none; } .section.active { display: block; }
    .tbl-wrap { background: #fff; border-radius: 10px; overflow: hidden; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; }
    td, th { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: #fff; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="sec-login">
  <h2>Auditoría Cris</h2>
  <p>Ingresa tu nombre para iniciar</p>
  <form onsubmit="handleLogin(event)">
    <input type="text" id="login-name" required style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ccc; border-radius:8px;">
    <button type="submit" class="btn btn-primary">Entrar</button>
  </form>
</div>

<!-- App -->
<div class="app" id="main-app-layout">
  <div class="topbar">
    <div class="tabs" style="display:flex; gap:5px; margin-bottom:10px;">
      <button class="tab" onclick="showTab('inventario')">Conteo</button>
      <button class="tab" onclick="showTab('alertas')">Reporte</button>
      <button class="tab" onclick="showTab('importar')">Excel</button>
    </div>
  </div>

  <div id="sec-inventario" class="section active">
    <input type="text" id="search" placeholder="Buscar..." oninput="renderTable()" style="width:100%; padding:10px;">
    <div class="tbl-wrap">
      <table><tbody id="tbl-body"></tbody></table>
    </div>
  </div>

  <div id="sec-alertas" class="section">
    <div id="alert-list"></div>
  </div>

  <div id="sec-importar" class="section">
    <input type="file" id="file-in" onchange="importExcel(this)">
    <button onclick="clearAuditor()" class="btn" style="background:red; color:white;">Reiniciar DB</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-wrap" style="display:none">
  <div class="modal">
    <h3 id="modal-title">Registrar Conteo</h3>
    <input type="number" id="m-real" placeholder="Cantidad en Percha" style="width:100%; padding:10px; margin:5px 0;">
    <button class="btn btn-primary" onclick="saveModal()">Guardar</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCcdKrWw2idAfFwdcSzXKhxLfLgasA0nIQ",
    authDomain: "inventarios-local.firebaseapp.com",
    projectId: "inventarios-local",
    storageBucket: "inventarios-local.firebasestorage.app",
    messagingSenderId: "1004193873972",
    appId: "1:1004193873972:web:8777d840a54d25a02cca61"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window.db = db;
  window.writeBatch = writeBatch;
  window.doc = doc;
  window.collection = collection;
  window.onSnapshot = onSnapshot;

  // Lógica de carga al iniciar
  window.addEventListener('load', () => {
    checkAuth();
    listenFirestore();
  });
</script>

<script>
  // Funciones globales simples
  function handleLogin(e) { e.preventDefault(); localStorage.setItem('user', document.getElementById('login-name').value); checkAuth(); }
  function checkAuth() { 
    if(localStorage.getItem('user')) {
      document.getElementById('sec-login').style.display = 'none';
      document.getElementById('main-app-layout').classList.add('active');
    }
  }
  function showTab(tab) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-' + tab).classList.add('active');
  }
  function openEditWithData(id) { 
    window.editingId = id; 
    document.getElementById('modal-wrap').style.display = 'flex'; 
  }
  function closeModal() { document.getElementById('modal-wrap').style.display = 'none'; }
  
  function saveModal() {
    // Aquí iría tu lógica de actualización hacia Firebase
    alert("Guardado");
    closeModal();
  }

  function listenFirestore() {
    if(!window.db) return;
    onSnapshot(collection(window.db, 'audit_droid_v2'), (snap) => {
      console.log("Datos sincronizados desde Firebase");
      // Aquí renderizas tu lista
    });
  }
</script>
</body>
</html>
